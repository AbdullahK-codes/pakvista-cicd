name: ci-staging

on:
  pull_request:
    branches:
      - staging
  push:
    branches:
      - staging

jobs:
  ci-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (linters + Parcel)
        run: npm install

      - name: Lint HTML
        run: npx htmlhint "*.html"

      - name: Lint CSS
        run: npx stylelint "style.css"

      - name: Build with Parcel
        run: npx parcel build index.html lahore.html hunza.html karachi.html swat.html --dist-dir dist --no-cache

      - name: Build Docker image (validate only)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest

      - name: Docker Login
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}
